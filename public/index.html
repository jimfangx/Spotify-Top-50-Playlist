<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spotify Top 50 Playlist</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172018;
      background: #f5f7f2;
    }

    main {
      width: min(560px, calc(100% - 32px));
      padding: 32px;
      border: 1px solid #d8dece;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 16px 40px rgba(23, 32, 24, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 24px;
      line-height: 1.5;
      color: #4b5549;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    a {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 650;
    }

    .primary {
      color: #ffffff;
      background: #1db954;
    }

    .secondary {
      color: #172018;
      background: #e8ecdf;
    }
  </style>
</head>

<body>
  <main>
    <h1>Spotify Top 50 Playlist</h1>
    <p>
      Authorize this app once, then run the protected update URL from GitHub Actions.
      The server stores tokens in MongoDB and never exposes them in the browser.
    </p>
    <div class="actions">
      <a class="primary" href="/login">Authorize Spotify</a>
      <a class="secondary" href="/auth/status">Check auth status</a>
    </div>
  </main>
</body>

</html>
